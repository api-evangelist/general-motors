specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: General Motors
providerId: general-motors
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Automotive
  - Connected Vehicle
description: General Motors monetizes connected-vehicle and OnStar services to consumers via
  subscription, and to partners/fleets via commercial agreement. There is no public per-API
  billing surface; FinOps applies to subscription mix and partner-fee allocation.
notes: No public API pricing surface; FinOps shape inferred from a vehicle-OEM connected-services
  / partner-program model.
sources:
  - https://developer.gm.com/
  - https://www.gm.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: General Motors LLC
serviceCategory: Automotive & Connected Services
billingModel:
  pricingCategory: Partner / Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: General Motors
  ServiceCategory: Automotive & Connected Services
  ProviderName: General Motors
  PublisherName: General Motors LLC
  InvoiceIssuerName: General Motors LLC
  BillingCurrency: USD
meters:
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api_product
      - vin
      - partner_id
  - name: vehicles_under_service
    unit: vehicle-month
    aggregation: max
    dimensions:
      - service_plan
  - name: data_transferred
    unit: GB
    aggregation: sum
    dimensions:
      - api_product
principles:
  - name: Visibility
    description: For partners, reconcile GM invoices against per-VIN service activations and API
      call volumes recorded in the partner portal.
  - name: Allocation
    description: Tag VINs / fleet groups to cost centers; segregate partner credentials per
      consuming application.
  - name: Optimization
    description: Right-size telematics polling intervals; use event-driven (push) channels where
      available rather than polling; consolidate fleet plans by usage tier.
  - name: Accountability
    description: Fleet manager / mobility-product owner owns spend; review service-plan mix and
      data-transfer growth quarterly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
